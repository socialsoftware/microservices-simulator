name: microservices-simulator
x-postgres-env:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
x-service-db:
  image: postgres:14-alpine
  healthcheck:
    test:
      - CMD-SHELL
      - pg_isready -U postgres
    interval: 10s
    timeout: 5s
    retries: 5
  networks:
    - messaging-network
x-service-healthcheck:
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 180s
x-limits-small:
  mem_limit: ${SMALL_MEM_LIMIT:-384m}
  mem_reservation: ${SMALL_MEM_RESERVATION:-256m}
  cpus: ${SMALL_CPUS:-0.5}
x-limits-medium:
  mem_limit: ${MEDIUM_MEM_LIMIT:-768m}
  mem_reservation: ${MEDIUM_MEM_RESERVATION:-512m}
  cpus: ${MEDIUM_CPUS:-1.0}
x-microservice-deps:
  eureka-server:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  jaeger:
    condition: service_started
services:
  eureka-server:
    mem_limit: ${MEDIUM_MEM_LIMIT:-768m}
    mem_reservation: ${MEDIUM_MEM_RESERVATION:-512m}
    cpus: ${MEDIUM_CPUS:-1.0}
    image: steeltoeoss/eureka-server:4.1.1
    networks:
      - messaging-network
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --spider
        - http://localhost:8761/actuator/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  jaeger:
    mem_limit: ${SMALL_MEM_LIMIT:-384m}
    mem_reservation: ${SMALL_MEM_RESERVATION:-256m}
    cpus: ${SMALL_CPUS:-0.5}
    image: jaegertracing/all-in-one:1.75.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - ${JAEGER_PORT:-16686}:16686
    restart: unless-stopped
    networks:
      - messaging-network
  rabbitmq:
    mem_limit: ${SMALL_MEM_LIMIT:-384m}
    mem_reservation: ${SMALL_MEM_RESERVATION:-256m}
    cpus: ${SMALL_CPUS:-0.5}
    image: rabbitmq:4-management
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - messaging-network
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - rabbitmqctl
        - status
      interval: 10s
      timeout: 5s
      retries: 5
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command:
      - --config=/etc/otel-collector-config.yaml
    depends_on:
      jaeger:
        condition: service_started
    volumes:
      - ./performance-analysis/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - messaging-network
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      - GRPC_PORT=${GRPC_PORT:-4319}
volumes:
  rabbitmq_data: null
  m2_cache: null
networks:
  messaging-network:
    driver: bridge
