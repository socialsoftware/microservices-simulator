# Application Configuration (YAML format)
spring:
  application: 
    name: advanced

  datasource: 
    url: jdbc:postgresql://localhost:5432/advanced_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa: 
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate: 
      ddl-auto: create-drop
    show-sql: true
    properties: 
      hibernate: 
        format_sql: true

server:
  port: 9515

saga:
  enabled: true
  timeout: 30000
  retry: 
    max-attempts: 3

events:
  async: true
  thread-pool-size: 10
