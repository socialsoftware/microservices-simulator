name: microservices-simulator # DO NOT CHANGE

include:
  - ../../docker-compose.yml

# ============================================
# SHARED CONFIGURATION (YAML anchors)
# ============================================

x-version-mode: &version-mode
  SPRING_PROFILES_INCLUDE: ${VERSION_MODE:-}

x-postgres-env: &postgres-env
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

x-service-db: &service-db
  image: postgres:14-alpine
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 10s
    timeout: 5s
    retries: 5
  networks:
    - messaging-network

x-service-healthcheck: &service-healthcheck
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 180s

x-limits-small: &limits-small
  mem_limit: ${SMALL_MEM_LIMIT:-384m}
  mem_reservation: ${SMALL_MEM_RESERVATION:-256m}
  cpus: ${SMALL_CPUS:-0.5}

x-limits-medium: &limits-medium
  mem_limit: ${MEDIUM_MEM_LIMIT:-768m}
  mem_reservation: ${MEDIUM_MEM_RESERVATION:-512m}
  cpus: ${MEDIUM_CPUS:-1.0}

x-microservice-env: &microservice-env
  <<: *version-mode
  EUREKA_HOST: eureka-server
  SPRING_RABBITMQ_HOST: rabbitmq
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317

x-microservice-deps: &microservice-deps
  eureka-server:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  jaeger:
    condition: service_started

x-test-quizzes: &test-quizzes
  build:
    context: ../../
    dockerfile: applications/quizzes/Dockerfile.test
  image: quizzes-tests:latest
  pull_policy: build
  stop_signal: SIGKILL
  stdin_open: true
  tty: true
  working_dir: /quizzes
  environment:
    OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
  volumes:
    - m2_cache:/root/.m2
  networks:
    - messaging-network

services:
  # ============================================
  # MONOLITHIC DATABASE
  # ============================================

  postgres:
    image: postgres:14-alpine
    container_name: postgres
    shm_size: 1g
    command: postgres -c 'max_connections=2000'
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - ../../data/dumps:/dumps
      - ../../data/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: msdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - messaging-network

  # ============================================
  # MONOLITHIC CONFIGURATIONS
  # ============================================

  quizzes-local:
    build:
      context: ../../
      dockerfile: applications/quizzes/Dockerfile
      args:
        PROFILE: ${TX_MODE:-sagas},local
    image: quizzes:latest
    pull_policy: build
    container_name: quizzes-local
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
      eureka-server:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      <<: *version-mode
      SPRING_PROFILES_ACTIVE: ${TX_MODE:-sagas},local
      EUREKA_HOST: eureka-server
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/msdb
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    networks:
      - messaging-network

  quizzes-remote:
    build:
      context: ../../
      dockerfile: applications/quizzes/Dockerfile
      args:
        PROFILE: ${TX_MODE:-sagas},${COMM_LAYER:-stream}
    image: quizzes:latest
    pull_policy: build
    container_name: quizzes-remote
    depends_on:
      postgres:
        condition: service_healthy
      <<: *microservice-deps
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      <<: *version-mode
      SPRING_PROFILES_ACTIVE: ${TX_MODE:-sagas},${COMM_LAYER:-stream}
      EUREKA_HOST: eureka-server
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/msdb
      SPRING_RABBITMQ_HOST: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    volumes:
      - ./src/test/resources:/src/test/resources
    networks:
      - messaging-network

  # =====================================================
  # MICROSERVICE DATABASES (Database-per-service pattern)
  # =====================================================

  answer-db:
    <<: [*service-db, *limits-small]
    container_name: answer-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: answerdb

  course-db:
    <<: [*service-db, *limits-small]
    container_name: course-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: coursedb

  execution-db:
    <<: [*service-db, *limits-small]
    container_name: execution-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: executiondb

  question-db:
    <<: [*service-db, *limits-small]
    container_name: question-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: questiondb

  quiz-db:
    <<: [*service-db, *limits-small]
    container_name: quiz-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: quizdb

  topic-db:
    <<: [*service-db, *limits-small]
    container_name: topic-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: topicdb

  tournament-db:
    <<: [*service-db, *limits-small]
    container_name: tournament-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: tournamentdb

  user-db:
    <<: [*service-db, *limits-small]
    container_name: user-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: userdb

  # ============================================
  # MICROSERVICES CONFIGURATION
  # ============================================

  answer-service:
    build:
      context: ../../
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes:latest
    pull_policy: build
    container_name: answer-service
    depends_on:
      <<: *microservice-deps
      answer-db:
        condition: service_healthy
    ports:
      - "8082:8082"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.answer.AnswerServiceApplication
      SPRING_PROFILES_ACTIVE: answer-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://answer-db:5432/answerdb
      JAVA_TOOL_OPTIONS: '${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0}'
    <<: *limits-medium
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1"]

  course-service:
    build:
      context: ../../
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes:latest
    pull_policy: build
    container_name: course-service
    depends_on:
      <<: *microservice-deps
      course-db:
        condition: service_healthy
    ports:
      - "8089:8089"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.course.CourseServiceApplication
      SPRING_PROFILES_ACTIVE: course-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://course-db:5432/coursedb
      JAVA_TOOL_OPTIONS: '${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0}'
    <<: *limits-medium
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8089/actuator/health || exit 1"]

  execution-service:
    build:
      context: ../../
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes:latest
    pull_policy: build
    container_name: execution-service
    depends_on:
      <<: *microservice-deps
      execution-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.execution.ExecutionServiceApplication
      SPRING_PROFILES_ACTIVE: execution-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://execution-db:5432/executiondb
      JAVA_TOOL_OPTIONS: '${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0}'
    <<: *limits-medium
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health || exit 1"]

  question-service:
    build:
      context: ../../
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes:latest
    pull_policy: build
    container_name: question-service
    depends_on:
      <<: *microservice-deps
      question-db:
        condition: service_healthy
    ports:
      - "8084:8084"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.question.QuestionServiceApplication
      SPRING_PROFILES_ACTIVE: question-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://question-db:5432/questiondb
      JAVA_TOOL_OPTIONS: '${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0}'
    <<: *limits-medium
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/actuator/health || exit 1"]

  quiz-service:
    build:
      context: ../../
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes:latest
    pull_policy: build
    container_name: quiz-service
    depends_on:
      <<: *microservice-deps
      quiz-db:
        condition: service_healthy
    ports:
      - "8085:8085"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.quiz.QuizServiceApplication
      SPRING_PROFILES_ACTIVE: quiz-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://quiz-db:5432/quizdb
      JAVA_TOOL_OPTIONS: '${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0}'
    <<: *limits-medium
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8085/actuator/health || exit 1"]

  topic-service:
    build:
      context: ../../
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes:latest
    pull_policy: build
    container_name: topic-service
    depends_on:
      <<: *microservice-deps
      topic-db:
        condition: service_healthy
    ports:
      - "8086:8086"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.topic.TopicServiceApplication
      SPRING_PROFILES_ACTIVE: topic-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://topic-db:5432/topicdb
      JAVA_TOOL_OPTIONS: '${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0}'
    <<: *limits-medium
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8086/actuator/health || exit 1"]

  tournament-service:
    build:
      context: ../../
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes:latest
    pull_policy: build
    container_name: tournament-service
    depends_on:
      <<: *microservice-deps
      tournament-db:
        condition: service_healthy
