    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.tournament.TournamentServiceApplication
      SPRING_PROFILES_ACTIVE: tournament-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://tournament-db:5432/tournamentdb
      JAVA_TOOL_OPTIONS: '${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0}'
    <<: *limits-medium
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8087/actuator/health || exit 1"]

  user-service:
    build:
      context: ../../
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes:latest
    pull_policy: build
    container_name: user-service
    depends_on:
      <<: *microservice-deps
      user-db:
