# ============================================
# SHARED CONFIGURATION (YAML anchors)
# ============================================

x-version-mode: &version-mode
  SPRING_PROFILES_INCLUDE: ${VERSION_MODE:-}

x-postgres-env: &postgres-env
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

x-service-db: &service-db
  image: postgres:14-alpine
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 10s
    timeout: 5s
    retries: 5
  networks:
    - messaging-network

x-service-healthcheck: &service-healthcheck
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 180s

x-microservice-env: &microservice-env
  <<: *version-mode
  EUREKA_HOST: eureka-server
  SPRING_RABBITMQ_HOST: rabbitmq
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317

x-microservice-deps: &microservice-deps
  eureka-server:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  jaeger:
    condition: service_started

x-test-quizzes: &test-quizzes
  image: maven:3.9.7-eclipse-temurin-21
  stop_signal: SIGKILL
  stdin_open: true
  tty: true
  working_dir: /quizzes
  volumes:
    - ./applications/quizzes:/quizzes
    - mavencache:/root/.m2

services:
  # ============================================
  # MONOLITHIC DATABASE
  # ============================================

  postgres:
    image: postgres:14-alpine
    container_name: postgres
    shm_size: 1g
    command: postgres -c 'max_connections=2000'
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - ./data/dumps:/dumps
      - ./data/init:/docker-entrypoint-initdb.d
    environment:
      <<: *postgres-env
      POSTGRES_DB: msdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - messaging-network

  # ============================================
  # MONOLITHIC CONFIGURATIONS
  # ============================================

  quizzes-local:
    build:
      context: .
      dockerfile: applications/quizzes/Dockerfile
      args:
        PROFILE: ${TX_MODE:-sagas},local
    image: quizzes
    container_name: quizzes-local
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      <<: *version-mode
      SPRING_PROFILES_ACTIVE: ${TX_MODE:-sagas},local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/msdb
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    networks:
      - messaging-network

  quizzes-remote:
    build:
      context: .
      dockerfile: applications/quizzes/Dockerfile
      args:
        PROFILE: ${TX_MODE:-sagas},${COMM_LAYER:-stream}
    image: quizzes
    container_name: quizzes-remote
    depends_on:
      postgres:
        condition: service_healthy
      <<: *microservice-deps
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      <<: *version-mode
      SPRING_PROFILES_ACTIVE: ${TX_MODE:-sagas},${COMM_LAYER:-stream}
      EUREKA_HOST: eureka-server
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/msdb
      SPRING_RABBITMQ_HOST: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    networks:
      - messaging-network

  # =====================================================
  # MICROSERVICE DATABASES (Database-per-service pattern)
  # =====================================================

  answer-db:
    <<: *service-db
    container_name: answer-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: answerdb

  course-db:
    <<: *service-db
    container_name: course-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: coursedb

  execution-db:
    <<: *service-db
    container_name: execution-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: executiondb

  question-db:
    <<: *service-db
    container_name: question-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: questiondb

  quiz-db:
    <<: *service-db
    container_name: quiz-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: quizdb

  topic-db:
    <<: *service-db
    container_name: topic-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: topicdb

  tournament-db:
    <<: *service-db
    container_name: tournament-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: tournamentdb

  user-db:
    <<: *service-db
    container_name: user-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: userdb

  version-db:
    <<: *service-db
    container_name: version-db
    environment:
      <<: *postgres-env
      POSTGRES_DB: versiondb

  # ============================================
  # MICROSERVICES CONFIGURATION
  # ============================================

  gateway:
    build:
      context: .
      dockerfile: applications/gateway/Dockerfile
    image: gateway
    container_name: gateway
    depends_on:
      <<: *microservice-deps
      answer-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
      execution-service:
        condition: service_healthy
      question-service:
        condition: service_healthy
      quiz-service:
        condition: service_healthy
      topic-service:
        condition: service_healthy
      tournament-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      VERSION_SERVICE_HOST: version-service
      EUREKA_HOST: eureka-server
      GATEWAY_LOG_LEVEL: INFO
      REACTIVE_LOG_LEVEL: INFO
      BUFFER_LOG_LEVEL: INFO
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]

  version-service:
    build:
      context: .
      dockerfile: simulator/Dockerfile
      args:
        PROFILE: version-service,${COMM_LAYER:-stream}
    image: simulator
    container_name: version-service
    depends_on:
      <<: *microservice-deps
      version-db:
        condition: service_healthy
    ports:
      - "8081:8081"
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: version-service,${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://version-db:5432/versiondb
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_HOST: eureka-server
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]

  answer-service:
    build:
      context: .
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes
    container_name: answer-service
    depends_on:
      <<: *microservice-deps
      answer-db:
        condition: service_healthy
    ports:
      - "8082:8082"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.answer.AnswerServiceApplication
      SPRING_PROFILES_ACTIVE: answer-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://answer-db:5432/answerdb
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1"]

  course-service:
    build:
      context: .
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes
    container_name: course-service
    depends_on:
      <<: *microservice-deps
      course-db:
        condition: service_healthy
    ports:
      - "8089:8089"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.course.CourseServiceApplication
      SPRING_PROFILES_ACTIVE: course-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://course-db:5432/coursedb
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8089/actuator/health || exit 1"]

  execution-service:
    build:
      context: .
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes
    container_name: execution-service
    depends_on:
      <<: *microservice-deps
      execution-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.execution.ExecutionServiceApplication
      SPRING_PROFILES_ACTIVE: execution-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://execution-db:5432/executiondb
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health || exit 1"]

  question-service:
    build:
      context: .
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes
    container_name: question-service
    depends_on:
      <<: *microservice-deps
      question-db:
        condition: service_healthy
    ports:
      - "8084:8084"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.question.QuestionServiceApplication
      SPRING_PROFILES_ACTIVE: question-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://question-db:5432/questiondb
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/actuator/health || exit 1"]

  quiz-service:
    build:
      context: .
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes
    container_name: quiz-service
    depends_on:
      <<: *microservice-deps
      quiz-db:
        condition: service_healthy
    ports:
      - "8085:8085"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.quiz.QuizServiceApplication
      SPRING_PROFILES_ACTIVE: quiz-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://quiz-db:5432/quizdb
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8085/actuator/health || exit 1"]

  topic-service:
    build:
      context: .
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes
    container_name: topic-service
    depends_on:
      <<: *microservice-deps
      topic-db:
        condition: service_healthy
    ports:
      - "8086:8086"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.topic.TopicServiceApplication
      SPRING_PROFILES_ACTIVE: topic-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://topic-db:5432/topicdb
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8086/actuator/health || exit 1"]

  tournament-service:
    build:
      context: .
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes
    container_name: tournament-service
    depends_on:
      <<: *microservice-deps
      tournament-db:
        condition: service_healthy
    ports:
      - "8087:8087"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.tournament.TournamentServiceApplication
      SPRING_PROFILES_ACTIVE: tournament-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://tournament-db:5432/tournamentdb
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8087/actuator/health || exit 1"]

  user-service:
    build:
      context: .
      dockerfile: applications/quizzes/Dockerfile
    image: quizzes
    container_name: user-service
    depends_on:
      <<: *microservice-deps
      user-db:
        condition: service_healthy
    ports:
      - "8088:8088"
    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.user.UserServiceApplication
      SPRING_PROFILES_ACTIVE: user-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/userdb
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8088/actuator/health || exit 1"]

  # ============================================
  # TEST CONTAINERS
  # ============================================

  test-simulator-sagas:
    image: maven:3.9.7-eclipse-temurin-21
    stop_signal: SIGKILL
    stdin_open: true
    tty: true
    working_dir: /simulator
    volumes:
      - ./simulator:/simulator
      - mavencache:/root/.m2
    command: mvn -Ptest-sagas test

  build-simulator:
    image: maven:3.9.7-eclipse-temurin-21
    stop_signal: SIGKILL
    working_dir: /simulator
    volumes:
      - ./simulator:/simulator
      - mavencache:/root/.m2
    command: mvn clean install -DskipTests

  test-quizzes-sagas:
    <<: *test-quizzes
    command: mvn -Ptest-sagas test

  test-quizzes-tcc:
    <<: *test-quizzes
    command: mvn -Ptest-tcc test

  test-fig3a:
    <<: *test-quizzes
    command: mvn -Ptest-tcc test -Dtest=TournamentFunctionalityCausalTest#'sequential update name in course execution and then add student as tournament participant'

  test-fig3b:
    <<: *test-quizzes
    command: mvn -Ptest-tcc test -Dtest=TournamentFunctionalityCausalTest#'sequential add student as tournament participant and then update name in course execution'

  test-fig3c:
    <<: *test-quizzes
    command: mvn -Ptest-tcc test -Dtest=TournamentFunctionalityCausalTest#'concurrent add student as tournament participant and update name in course execution - add student finishes first'

  test-fig3d:
    <<: *test-quizzes
    command: mvn -Ptest-tcc test -Dtest=TournamentFunctionalityCausalTest#'concurrent add student as tournament participant and update name in course execution - update name finishes first'

  test-fig4:
    <<: *test-quizzes
    command: mvn -Ptest-tcc test -Dtest=TournamentFunctionalityCausalTest#'concurrent add creator as tournament participant and update name in course execution - update name finishes first and event processing starts before add creator finishes'

  # ============================================
  # INFRASTRUCTURE
  # ============================================

  eureka-server:
    image: steeltoeoss/eureka-server:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - messaging-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  jaeger:
    image: jaegertracing/all-in-one:1.75.0
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # Jaeger gRPC
      - "14268:14268" # Jaeger HTTP
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    restart: unless-stopped
    networks:
      - messaging-network

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - messaging-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mavencache:
  rabbitmq_data:

networks:
  messaging-network:
    driver: bridge
