apiVersion: v1
kind: Service
metadata:
  name: answer-service
  namespace: microservices-simulator
spec:
  selector:
    app: answer-service
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: answer-service
  namespace: microservices-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: answer-service
  template:
    metadata:
      labels:
        app: answer-service
    spec:
      serviceAccountName: microservices-sa
      containers:
        - name: answer-service
          image: simulatorcr.azurecr.io/quizzes:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: START_CLASS
              value: "pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.answer.AnswerServiceApplication"
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes,answer-service,sagas,stream,distributed-version"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/answerdb"
            - name: SPRING_RABBITMQ_HOST
              value: "rabbitmq"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger:4317"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
