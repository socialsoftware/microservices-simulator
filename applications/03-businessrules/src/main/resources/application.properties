# Profile Configuration
spring.profiles.active=@activatedProperties@

# Maven Properties
maven.basedir=@project.basedir@

# Application Configuration
spring.application.name=businessrules
server.port=8733

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/businessrules_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.jakarta.persistence.sharedCache.mode=UNSPECIFIED

# Scheduling Configuration
spring.task.scheduling.pool.size=5

# Retry Configuration
retry.db.maxAttempts=3
retry.db.delay=200
retry.db.multiplier=2

# Template Configuration
spring.groovy.template.check-template-location=false

# Saga Pattern Configuration
saga.enabled=true
saga.timeout=30000
saga.retry.max-attempts=3

# Event Configuration
spring.events.async=true
spring.events.thread-pool-size=10

# Validation Configuration
validation.enabled=true
validation.fail-fast=false

# Service Discovery (disabled by default; enable when running in a microservices topology)
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false
