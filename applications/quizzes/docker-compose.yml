    restart: unless-stopped
    environment:
      <<: *microservice-env
      START_CLASS: pt.ulisboa.tecnico.socialsoftware.quizzes.microservices.user.UserServiceApplication
      SPRING_PROFILES_ACTIVE: user-service,${TX_MODE:-sagas},${COMM_LAYER:-stream}
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/userdb
      JAVA_TOOL_OPTIONS: '${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0}'
    <<: *limits-medium
    networks:
      - messaging-network
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8088/actuator/health || exit 1"]

  # ============================================
  # TEST CONTAINERS
  # ============================================

  test-quizzes-sagas:
    <<: *test-quizzes
    command: mvn clean -Ptest-sagas test
    depends_on:
      jaeger:
        condition: service_started

  test-quizzes-tcc:
    <<: *test-quizzes
    command: mvn clean -Ptest-tcc test

  test-fig3a:
    <<: *test-quizzes
    command: mvn clean -Ptest-tcc test -Dtest=TournamentFunctionalityCausalTest#'sequential update name in course execution and then add student as tournament participant'

  test-fig3b:
    <<: *test-quizzes
    command: mvn clean -Ptest-tcc test -Dtest=TournamentFunctionalityCausalTest#'sequential add student as tournament participant and then update name in course execution'

  test-fig3c:
    <<: *test-quizzes
    command: mvn clean -Ptest-tcc test -Dtest=TournamentFunctionalityCausalTest#'concurrent add student as tournament participant and update name in course execution - add student finishes first'

  test-fig3d:
    <<: *test-quizzes
    command: mvn clean -Ptest-tcc test -Dtest=TournamentFunctionalityCausalTest#'concurrent add student as tournament participant and update name in course execution - update name finishes first'

  test-fig4:
    <<: *test-quizzes
    command: mvn clean -Ptest-tcc test -Dtest=TournamentFunctionalityCausalTest#'concurrent add creator as tournament participant and update name in course execution - update name finishes first and event processing starts before add creator finishes'
