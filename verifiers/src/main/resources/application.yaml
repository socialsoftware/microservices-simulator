spring:
  application:
    name: verifiers
  main:
    web-application-type: none

verifiers:
  applications-root: ${VERIFIERS_APPLICATIONS_ROOT:/applications}
  application-base-dir: ${VERIFIERS_APPLICATION_BASE_DIR:quizzes}
  output-root: ${VERIFIERS_OUTPUT_ROOT:output}
  scenario-catalog:
    enabled: false
    catalog-path: scenario-catalog.jsonl
    manifest-path: scenario-catalog-manifest.json
    rejected-inputs-path: scenario-catalog-rejected-inputs.jsonl
    accounting-path: scenario-space-accounting.json
    generation-strategy: INTERACTION_PRUNED
    catalog-write-mode: WRITE_PLANS
    include-singles: true
    max-saga-set-size: 1
    max-scenarios: 100
    max-input-variants-per-saga: 3
    max-schedules-per-input-tuple: 20
    allow-type-only-fallback: false
    input-policy: RESOLVED_OR_REPLAYABLE
    schedule-strategy: SERIAL
    deterministic-seed: 1234
  dynamic-enrichment:
    enabled: false
    allow-partial-test-run: true
    dynamic-evidence-subdir: dynamic-evidence
    enriched-catalog-path: scenario-catalog-enriched.jsonl
    enriched-manifest-path: scenario-catalog-enriched-manifest.json
    join-report-path: dynamic-evidence-join-report.json
    test-source-root: src/test/groovy
    include-test-dirs: []
    exclude-test-dirs: []
    exclude-test-classes:
      - CreateTournamentDynamicEvidenceSmokeTest
      - DynamicEvidenceDisabledSmokeTest
    per-test-timeout-seconds: 300
    maven:
      executable: mvn
      profile: test-sagas

eureka:
  client:
    enabled: false
