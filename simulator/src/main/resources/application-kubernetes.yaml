spring:
  cloud:
    kubernetes:
      enabled: true
      discovery:
        enabled: true
        all-namespaces: false
      loadbalancer:
        enabled: true

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

grpc:
  service-suffix: "-service"
