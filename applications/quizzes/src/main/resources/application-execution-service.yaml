spring:
  application:
    name: execution
  datasource:
    url: jdbc:postgresql://localhost:5432/executiondb

  cloud:
    function:
      definition: commandResponseChannel;executionServiceCommandChannel;executionEventSubscriber;
    stream:
      bindings:
        execution-command-channel:
          destination: execution-command-channel
        executionServiceCommandChannel-in-0:
          destination: execution-command-channel
          group: execution-service-group
        commandResponseChannel-in-0:
          destination: execution-command-responses
          group: execution-response-group
        executionEventSubscriber-in-0:
          destination: event-channel
          group: execution-service-group

server:
  port: 8083
grpc:
  server:
    port: 9093

routes:
  - id: execution-service-users
    uri: lb://execution${gateway.service-suffix}
    predicates:
      - Path=/users/*/executions
    order: 1

  - id: execution-service-create
    uri: lb://execution${gateway.service-suffix}
    predicates:
      - Path=/executions/create
    order: 8

  - id: execution-service
    uri: lb://execution${gateway.service-suffix}
    predicates:
      - Path=/executions/**
    order: 10

---
spring:
  config:
    activate:
      on-profile: "!kubernetes"
  cloud:
    discovery:
      enabled: true

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
    metadata-map:
      grpcPort: ${grpc.server.port}
