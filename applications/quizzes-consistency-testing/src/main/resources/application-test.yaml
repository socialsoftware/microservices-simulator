spring:
  cloud:
    discovery:
      enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show_sql: false
        format_sql: true

server:
  port: 8080

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

local:
  messaging:
    serialize: true # This is used to mimic remote communication in the local tests with serialization of the commands